name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Prepare Project and Dependencies
      run: |
        # 1. On s'assure d'être dans le bon répertoire
        cd $GITHUB_WORKSPACE
        
        # 2. On télécharge les dépendances (comprenant dart_ssh2 de ton pubspec.yaml)
        flutter pub get

    - name: Build iOS
      run: |
        cd $GITHUB_WORKSPACE
        flutter build ios --no-codesign --verbose

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-build-output
        path: build/ios/iphoneos/Runner.app
